<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: white;
    }
    body.shopee {
      background: linear-gradient(135deg, #ee4d2d 0%, #ff6633 100%);
    }
    body.lazada {
      background: linear-gradient(135deg, #0f146d 0%, #f85606 100%);
    }
    body.unsupported {
      background: linear-gradient(135deg, #666 0%, #444 100%);
    }
    h2 {
      margin: 0 0 15px 0;
      font-size: 18px;
      text-align: center;
    }
    .platform-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-left: 5px;
      vertical-align: middle;
    }
    .platform-badge.shopee { background: #ee4d2d; }
    .platform-badge.lazada { background: #f85606; }
    .info {
      background: rgba(255,255,255,0.2);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 13px;
    }
    .info div {
      margin: 5px 0;
    }
    .status {
      background: rgba(0,0,0,0.2);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      min-height: 60px;
      font-size: 12px;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    #crawlBtn {
      background: white;
      color: #333;
    }
    #crawlBtn:hover {
      background: #f5f5f5;
      transform: scale(1.02);
    }
    #crawlBtn:disabled {
      background: #ccc;
      color: #666;
      cursor: not-allowed;
      transform: none;
    }
    .error {
      color: #ffcccc;
    }
    .success {
      color: #90EE90;
    }
    .progress {
      margin-top: 10px;
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: white;
      width: 0%;
      transition: width 0.3s;
    }
    .supported-platforms {
      font-size: 11px;
      text-align: center;
      margin-top: 10px;
      opacity: 0.8;
    }
  </style>
</head>
<body class="unsupported">
  <h2>🛒 Review Crawler <span class="platform-badge" id="platformBadge"></span></h2>
  
  <div class="info">
    <div><strong>Platform:</strong> <span id="platform">-</span></div>
    <div id="shopIdRow"><strong>Shop ID:</strong> <span id="shopId">-</span></div>
    <div><strong>Item ID:</strong> <span id="itemId">-</span></div>
    <div><strong>Tổng reviews:</strong> <span id="totalReviews">-</span></div>
  </div>
  
  <div class="status" id="status">
    Mở trang sản phẩm Shopee/Lazada và nhấn nút bên dưới để crawl.
  </div>
  
  <div class="progress" id="progressContainer" style="display:none;">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  
  <button id="crawlBtn">🚀 Crawl Tất Cả Reviews</button>
  
  <div class="supported-platforms">
    Hỗ trợ: Shopee, Lazada
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
